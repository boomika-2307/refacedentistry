{% extends 'base.html' %}

{% block title %}Create Account | Reface Dental{% endblock %}

{% block extra_css %}
<style>
.auth-section { min-height: calc(100vh - 72px); display: flex; align-items: center; justify-content: center; background: var(--off-white); padding: 3rem 1.5rem; }
.auth-card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 480px; overflow: hidden; }
.auth-header { background: var(--primary); padding: 2.5rem 2rem; text-align: center; }
.auth-header .logo-icon { background: rgba(255,255,255,0.1); margin: 0 auto 1rem; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1.5rem; }
.auth-header h2 { font-family: var(--font-display); font-size: 1.75rem; color: white; }
.auth-header p { color: rgba(255,255,255,0.65); font-size: 0.875rem; margin-top: 0.25rem; }
.auth-body { padding: 2.5rem 2rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.5rem; }
.form-control { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: var(--font-body); font-size: 0.9rem; color: var(--text-dark); background: white; transition: border-color 0.2s; outline: none; }
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,74,74,0.08); }
.form-control::placeholder { color: var(--text-light); }
.input-icon { position: relative; }
.input-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 0.85rem; }
.input-icon .form-control { padding-left: 2.5rem; }
.btn-full { width: 100%; justify-content: center; padding: 0.875rem; font-size: 0.95rem; }
.auth-footer { text-align: center; padding: 0 2rem 2rem; font-size: 0.875rem; color: var(--text-medium); }
.auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
            <h2>Create Account</h2>
            <p>Join the Reface patient community</p>
        </div>
        <div class="auth-body">
            <form method="post">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" placeholder="Priya" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" placeholder="Rajan" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" name="phone" class="form-control" placeholder="+91 99999 99999" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'patient_login' %}">Sign in</a>
        </div>
    </div>
</section>
{% endblock %}
