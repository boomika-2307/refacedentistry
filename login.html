{% extends 'base.html' %}

{% block title %}Patient Login | Reface Dental{% endblock %}

{% block extra_css %}
<style>
.auth-section {
    min-height: calc(100vh - 72px);
    display: flex; align-items: center; justify-content: center;
    background: var(--off-white);
    padding: 3rem 1.5rem;
}
.auth-card {
    background: white;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 440px;
    overflow: hidden;
}
.auth-header {
    background: var(--primary);
    padding: 2.5rem 2rem;
    text-align: center;
}
.auth-header .logo-icon { background: rgba(255,255,255,0.1); margin: 0 auto 1rem; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1.5rem; }
.auth-header h2 { font-family: var(--font-display); font-size: 1.75rem; color: white; }
.auth-header p { color: rgba(255,255,255,0.65); font-size: 0.875rem; margin-top: 0.25rem; }
.auth-body { padding: 2.5rem 2rem; }
.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.5rem; }
.form-control {
    width: 100%; padding: 0.75rem 1rem;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: var(--font-body); font-size: 0.9rem;
    color: var(--text-dark); background: white;
    transition: border-color 0.2s;
    outline: none;
}
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,74,74,0.08); }
.form-control::placeholder { color: var(--text-light); }
.input-icon { position: relative; }
.input-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 0.85rem; }
.input-icon .form-control { padding-left: 2.5rem; }
.btn-full { width: 100%; justify-content: center; padding: 0.875rem; font-size: 0.95rem; }
.auth-footer { text-align: center; padding: 0 2rem 2rem; }
.auth-footer p { font-size: 0.875rem; color: var(--text-medium); }
.auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
.auth-footer a:hover { color: var(--accent); }
.divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 0.8rem; color: var(--text-light); white-space: nowrap; }
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon"><i class="fas fa-tooth"></i></div>
            <h2>Welcome Back</h2>
            <p>Sign in to your Reface patient account</p>
        </div>
        <div class="auth-body">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
        </div>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'patient_register' %}">Register here</a></p>
            <div class="divider"><span>or</span></div>
            <a href="{% url 'book_appointment' %}" class="btn btn-outline btn-full">Book without login</a>
        </div>
    </div>
</section>
{% endblock %}
